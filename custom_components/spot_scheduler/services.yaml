set_device_schedule:
  name: Set device schedule
  description: Set the schedule state for a specific device and hour.
  fields:
    date:
      name: Date
      description: Target date (defaults to today).
      required: false
      example: "2025-03-05"
      selector:
        date:
    hour:
      name: Hour
      description: Hour of the day (0-23).
      required: true
      example: 14
      selector:
        number:
          min: 0
          max: 23
          step: 1
          mode: box
    device_id:
      name: Device entity ID
      description: Entity ID of the device to schedule.
      required: true
      example: "switch.water_heater"
      selector:
        entity:
          domain:
            - switch
            - light
            - climate
            - input_boolean
    enabled:
      name: Enabled
      description: >
        true = turn on, false = turn off, omit/null = unset (don't touch).
        When unset follows an on-hour, the device is turned off automatically.
      required: false
      example: true
      selector:
        boolean:

refresh_prices:
  name: Refresh prices
  description: Manually trigger a price fetch from Nord Pool. Fetches for all configured Spot Scheduler instances.
  fields:
    date:
      name: Date
      description: Date to fetch prices for (defaults to today).
      required: false
      example: "2025-03-05"
      selector:
        date:

apply_schedules_now:
  name: Apply schedules now
  description: >
    Immediately apply the current hour's schedule to all managed devices —
    exactly like the automatic trigger at :00:05, but callable at any time.
    Useful for development and testing.
  fields:
    entry_id:
      name: Entry ID
      description: >
        Limit to a specific SpotScheduler config entry (optional).
        Leave empty to trigger all instances.
      required: false
      example: "abc123def456"
      selector:
        text:
