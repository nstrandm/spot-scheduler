<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" width="480" height="420">
  <defs>
    <style>text { font-family: 'Segoe UI', system-ui, sans-serif; }</style>
  </defs>
  <rect width="480" height="420" rx="4" fill="#111827"/>

  <!-- Dialog -->
  <rect x="40" y="20" width="400" height="380" rx="14" fill="#1c2333" stroke="#2a3348" stroke-width="1"/>

  <!-- Header -->
  <rect x="40" y="20" width="400" height="58" rx="14" fill="#151b28"/>
  <rect x="40" y="54" width="400" height="24" fill="#151b28"/>
  <rect x="56" y="32" width="36" height="36" rx="8" fill="#1e3a5f"/>
  <text x="74" y="56" fill="#60a5fa" font-size="18" text-anchor="middle">⚡</text>
  <text x="104" y="48" fill="#fff" font-size="15" font-weight="700">SpotScheduler</text>
  <text x="104" y="64" fill="#4a5568" font-size="11">Add integration · Step 1 of 2</text>

  <!-- Step indicator -->
  <circle cx="116" cy="98" r="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="116" y="103" fill="#60a5fa" font-size="11" text-anchor="middle" font-weight="700">1</text>
  <line x1="128" y1="98" x2="352" y2="98" stroke="#2a3348" stroke-width="2"/>
  <circle cx="364" cy="98" r="12" fill="#1a1f2e" stroke="#2a3348" stroke-width="2"/>
  <text x="364" y="103" fill="#4a5568" font-size="11" text-anchor="middle">2</text>
  <text x="116" y="120" fill="#60a5fa" font-size="10" text-anchor="middle" font-weight="600">Settings</text>
  <text x="364" y="120" fill="#4a5568" font-size="10" text-anchor="middle">Devices</text>

  <!-- Name field -->
  <text x="60" y="148" fill="#8896b3" font-size="11" font-weight="600">NAME</text>
  <rect x="60" y="154" width="360" height="36" rx="8" fill="#151b28" stroke="#1e4d8f" stroke-width="1.5"/>
  <text x="76" y="177" fill="#93c5fd" font-size="13">SpotScheduler</text>

  <!-- Nord Pool entry field -->
  <text x="60" y="210" fill="#8896b3" font-size="11" font-weight="600">NORD POOL INTEGRATION ENTRY</text>
  <rect x="60" y="216" width="360" height="36" rx="8" fill="#151b28" stroke="#2a3348" stroke-width="1.5"/>
  <text x="76" y="239" fill="#c8d3e8" font-size="13">Nord Pool FI · EUR</text>
  <text x="404" y="239" fill="#4a5568" font-size="12" text-anchor="middle">▼</text>
  <text x="60" y="262" fill="#4a5568" font-size="10">Select your configured Nord Pool integration instance.</text>

  <!-- Expensive hours slider -->
  <text x="60" y="284" fill="#8896b3" font-size="11" font-weight="600">EXPENSIVE HOURS TO HIGHLIGHT</text>
  <rect x="60" y="290" width="300" height="4" rx="2" fill="#2a3348"/>
  <rect x="60" y="290" width="75" height="4" rx="2" fill="#3b82f6"/>
  <circle cx="135" cy="292" r="9" fill="#3b82f6" stroke="#1e3a5f" stroke-width="2"/>
  <text x="386" y="297" fill="#60a5fa" font-size="15" font-weight="700" text-anchor="middle">3</text>
  <text x="60" y="314" fill="#4a5568" font-size="10">This many most expensive hours per day will be highlighted in red.</text>

  <!-- Buttons -->
  <line x1="60" y1="338" x2="420" y2="338" stroke="#1e2435" stroke-width="1"/>
  <rect x="280" y="350" width="80" height="34" rx="8" fill="transparent" stroke="#2a3348" stroke-width="1.5"/>
  <text x="320" y="372" fill="#6b7a99" font-size="12" text-anchor="middle">Cancel</text>
  <rect x="372" y="350" width="88" height="34" rx="8" fill="#1e4d8f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="416" y="372" fill="#93c5fd" font-size="12" text-anchor="middle">Next →</text>
</svg>
